# =============================================================================
# Docker Compose — Frontend (Nginx) + Backend (.NET) come servizi separati.
#
# STESSO HOST:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#   → Frontend su porta FRONTEND_PORT, Nginx proxya /api/* al backend internamente.
#
# HOST SEPARATI:
#   Sul server del backend (cliente):
#     docker-compose up backend
#   Sul server del frontend (tuo):
#     API_URL=https://api.cliente.it docker-compose up frontend
#   → Il frontend chiama il backend remoto direttamente (configurare CORS).
#
# VARIABILI OBBLIGATORIE (da .env):
#   PROJECT_NAME    — identifica il progetto (usato per volumi e namespace)
#   FRONTEND_PORT   — porta host del frontend
# =============================================================================

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      PROJECT_NAME: ${PROJECT_NAME:?ERRORE: impostare PROJECT_NAME nel file .env}
      # Vuoto = Nginx proxya /api/* al backend (stesso host).
      # Valorizzato = il browser chiama direttamente il backend remoto.
      API_URL: ${API_URL:-}
      API_KEY: ${API_KEY:-frontend}
    ports:
      - "${FRONTEND_PORT:?ERRORE: impostare FRONTEND_PORT nel file .env}:80"
    depends_on:
      backend:
        condition: service_healthy
        required: false
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PROJECT_NAME: ${PROJECT_NAME:?ERRORE: impostare PROJECT_NAME nel file .env}
      ASPNETCORE_ENVIRONMENT: Production
      # Segreti — sovrascrivono appsettings.json via configuration binding .NET
      # Decommentare e valorizzare in produzione:
      # Security__ApiKeys__0: frontend
      # Security__Token__Password: CAMBIAMI
      # Security__Token__SecretKey: CAMBIAMI_MIN_32_CHARS
      # Security__CorsOrigins__0: https://miosito.it
    # Backend non esposto di default (raggiungibile solo via rete Docker).
    # Per esporlo: usare docker-compose.backend-exposed.yml
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  app-data:
    name: ${PROJECT_NAME:?ERRORE: impostare PROJECT_NAME nel file .env}-app-data
    driver: local
