# =============================================================================
# Docker Compose - Frontend SSR Node + Backend (.NET) come servizi separati.
#
# DEV (automatico):
#   docker compose up
#   -> Applica docker-compose.override.yml: Angular dev server + backend con hot reload.
#
# PROD (stesso host):
#   docker compose -f docker-compose.yml up -d --build
#
# PROD (backend esposto sull'host, es. API pubbliche o deploy separato):
#   docker compose -f docker-compose.yml -f docker-compose.backend-exposed.yml up -d --build
#
# HOST SEPARATI:
#   Sul server del backend:
#     docker compose -f docker-compose.yml up -d --build backend
#   Sul server del frontend (API_URL punta al backend remoto):
#     API_URL=https://api.cliente.it docker compose -f docker-compose.yml up -d --build frontend
#
# NOTA: specificare -f docker-compose.yml esclude docker-compose.override.yml (dev).
#
# VARIABILI OBBLIGATORIE (da .env):
#   PROJECT_NAME  - identifica il progetto (usato per i volumi Docker)
#   FRONTEND_PORT - porta esposta del frontend
# =============================================================================

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        SITEMAP_BASE_URL: "${SITEMAP_BASE_URL:-}"
        # Nome del progetto Angular (angular.json). Cambiare se si rinomina il progetto.
        DIST_PATH: "${DIST_PATH:-br1-web-engine}"
    environment:
      PROJECT_NAME: "${PROJECT_NAME:?ERRORE: impostare PROJECT_NAME nel file .env}"
      PORT: "${FRONTEND_PORT:?ERRORE: impostare FRONTEND_PORT nel file .env}"
      BACKEND_PORT: "${BACKEND_PORT:-8080}"
      DIST_PATH: "${DIST_PATH:-br1-web-engine}"
      # Vuoto = Node SSR proxya /api/* al backend (stesso host).
      # Valorizzato = il browser chiama direttamente il backend remoto.
      API_URL: "${API_URL:-}"
      API_KEY: "${API_KEY:-frontend}"
      PROXY_TIMEOUT_MS: "${PROXY_TIMEOUT_MS:-30000}"
      # Header di sicurezza HTML. Vuoti = usa i default di server.ts.
      # Sovrascrivere se il progetto usa CDN, Google Fonts, analytics, ecc.
      SECURITY_CSP: "${SECURITY_CSP:-}"
      SECURITY_X_FRAME_OPTIONS: "${SECURITY_X_FRAME_OPTIONS:-}"
      SECURITY_REFERRER_POLICY: "${SECURITY_REFERRER_POLICY:-}"
      SECURITY_PERMISSIONS_POLICY: "${SECURITY_PERMISSIONS_POLICY:-}"
    ports:
      - "${FRONTEND_PORT:?ERRORE: impostare FRONTEND_PORT nel file .env}:${FRONTEND_PORT:?ERRORE: impostare FRONTEND_PORT nel file .env}"
    depends_on:
      backend:
        condition: service_healthy
        required: false
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PROJECT_NAME: "${PROJECT_NAME:?ERRORE: impostare PROJECT_NAME nel file .env}"
      ASPNETCORE_ENVIRONMENT: Production
      BACKEND_PORT: "${BACKEND_PORT:-8080}"
      ASPNETCORE_URLS: "http://+:${BACKEND_PORT:-8080}"
      # Segreti - sovrascrivono appsettings.json via configuration binding .NET.
      # Decommentare e valorizzare in produzione:
      # Security__ApiKeys__0: frontend
      # Security__Token__SecretKey: CAMBIAMI_MIN_32_CHARS
      # Security__Token__ExpirationSeconds: "3000"
      # Security__CorsOrigins__0: https://miosito.it
      # Security__BehindProxy: "true"   # true se c'è Nginx/Cloudflare/ALB davanti
      # Lingue supportate dal backend - decommentare per modificare:
      # Localization__DefaultLanguage: it
      # Localization__SupportedLanguages__0: it
      # Localization__SupportedLanguages__1: en
      # Header di sicurezza backend (sulle risposte API). Nota: i nomi contengono trattini
      # quindi non sono sovrascrivibili via .env ma solo da qui o da appsettings.json.
      # Security__Headers__Content-Security-Policy: "default-src 'self'"
      # Security__Headers__X-Frame-Options: "SAMEORIGIN"
    # Backend non esposto di default (raggiungibile solo via rete Docker).
    # Per esporlo: usare docker-compose.backend-exposed.yml
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${BACKEND_PORT:-8080}/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  app-data:
    name: "${PROJECT_NAME:?ERRORE: impostare PROJECT_NAME nel file .env}-app-data"
    driver: local
