# =============================================================================
# Docker Compose - Frontend SSR Node + Backend (.NET) come servizi separati.
#
# DEV (automatico):
#   docker compose up
#   -> Applica docker-compose.override.yml: Angular dev server + backend in Development.
#
# PROD (stesso host):
#   docker compose -f docker-compose.yml up -d --build
#
# PROD (backend esposto sull'host, es. API pubbliche o deploy separato):
#   docker compose -f docker-compose.yml -f docker-compose.backend-exposed.yml up -d --build
#
# NOTA: specificare -f docker-compose.yml esclude docker-compose.override.yml (dev).
#
# VARIABILI OBBLIGATORIE (da .env):
#   COMPOSE_PROJECT_NAME - identifica il progetto (naming volumi Docker, built-in)
#   FRONTEND_PORT        - porta esposta del frontend
# =============================================================================

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        SITEMAP_BASE_URL: "${SITEMAP_BASE_URL:-}"
    environment:
      PORT: "${FRONTEND_PORT:?ERRORE: impostare FRONTEND_PORT nel file .env}"
      BACKEND_ORIGIN: "${BACKEND_ORIGIN:-http://backend:8080}"
      BACKEND_API_KEY: "${BACKEND_API_KEY:-frontend}"
    ports:
      - "${FRONTEND_PORT:?ERRORE: impostare FRONTEND_PORT nel file .env}:${FRONTEND_PORT:?ERRORE: impostare FRONTEND_PORT nel file .env}"
    depends_on:
      backend:
        condition: service_healthy
        required: false
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - uploads-data:/app/uploads
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  uploads-data:
    driver: local
