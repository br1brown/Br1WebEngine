# Configurazione di produzione — docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
services:
  frontend:
    ports:
      - "80:80"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    ports:
      - "8080:8080"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
