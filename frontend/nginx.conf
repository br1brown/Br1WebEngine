server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressione
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Cache per asset con hash (immutabile)
    location ~* \.[0-9a-f]{16,}\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API al backend (stesso host via docker network)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service worker e manifest — senza cache
    location = /ngsw-worker.js {
        expires -1;
        add_header Cache-Control "no-store";
    }
    location = /ngsw.json {
        expires -1;
        add_header Cache-Control "no-store";
    }
    location = /manifest.webmanifest {
        expires 1d;
    }

    # Instradamento SPA — tutte le route Angular servite da index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
