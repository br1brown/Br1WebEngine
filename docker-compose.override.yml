# Override di sviluppo — applicato automaticamente da Docker Compose.
# Backend in modalità Development, frontend con Angular dev server.
# Uso: docker compose up (senza -f, applica override automaticamente)
services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run start:docker -- --host 0.0.0.0 --port 4200 --disable-host-check"
    ports:
      - "${DEV_FRONTEND_PORT:-4200}:4200"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${DEV_BACKEND_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      start_period: 15s
    restart: unless-stopped
    networks:
      - app-network

volumes:
  frontend-node-modules:
    driver: local
