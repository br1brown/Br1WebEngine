# Override di sviluppo — applicato automaticamente da Docker Compose.
# Backend con dotnet watch, frontend con proxy Angular verso il container backend.
# Uso: docker-compose up (senza -f, applica override automaticamente)
services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run start:docker -- --host 0.0.0.0 --port 4200 --disable-host-check"
    ports:
      - "${DEV_FRONTEND_PORT:-4200}:4200"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${DEV_BACKEND_PORT:-5000}:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      BACKEND_PORT: "5000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
    volumes:
      - ./backend:/app/backend
      - app-data:/app/data
    restart: unless-stopped
    networks:
      - app-network

volumes:
  frontend-node-modules:
    driver: local
